<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countdown Timer</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="container">
      <article>
        <hgroup>
          <h1>Countdown Timer</h1>
          <h2>Set your timer and countdown</h2>
        </hgroup>

        <div class="input-group">
          <div>
            <label for="minutes">
              Minutes
              <input
                type="number"
                id="minutes"
                min="0"
                max="99"
                value="1"
                placeholder="0"
              />
            </label>
          </div>
          <div>
            <label for="seconds">
              Seconds
              <input
                type="number"
                id="seconds"
                min="0"
                max="59"
                value="0"
                placeholder="0"
              />
            </label>
          </div>
        </div>

        <div class="timer-display" id="timer">01:00</div>

        <div class="controls">
          <button id="startBtn" onclick="startTimer()">Start</button>
          <button id="pauseBtn" onclick="pauseTimer()" disabled>Pause</button>
          <button id="resetBtn" onclick="resetTimer()">Reset</button>
        </div>

        <p id="result">Result will be updated here!</p>
      </article>
    </main>
  </body>
</html>
