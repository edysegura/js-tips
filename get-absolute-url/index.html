<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Get the absolute URL</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="container">
      <article>
        <hgroup>
          <h1>Get Absolute URL</h1>
          <h2>Convert relative paths to absolute URLs</h2>
        </hgroup>
        <form method="post">
          <fieldset role="group">
            <input
              id="relative-path"
              type="text"
              placeholder="/relative-path"
              autocomplete="off"
            />
            <input type="submit" value="Get absolute URL" />
          </fieldset>
        </form>
        <section>
          <label>Result:</label>
          <output></output>
        </section>
      </article>
    </main>
  </body>
</html>
